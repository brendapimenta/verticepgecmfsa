<style>
:root {
  /* Sidebar navy (escura) */
  --navy:        #0f2040;
  --navy-mid:    #162b52;
  --navy-light:  #1e3a6e;
  --navy-accent: #2a4f8f;
  --sidebar-text:#e8edf5;
  --sidebar-dim: #8a9bb5;
  /* Interior (igual Lovable) */
  --bg:          #eef2f8;
  --bg2:         #ffffff;
  --bg3:         #f4f6fb;
  --text:        #1a2640;
  --text-dim:    #4a5a70;
  --text-muted:  #8a9bb5;
  --border:      #e2e8f0;
  --border2:     #cbd5e0;
  /* Semânticas */
  --blue:        #1a3a6e;
  --blue-bg:     #e8f0fb;
  --gold:        #b8860b;
  --gold-bg:     #fef9e7;
  --red:         #c0392b;
  --red-bg:      #fdf0ee;
  --green:       #1a6e3a;
  --green-bg:    #edfaf3;
  --amber:       #c07800;
  --amber-bg:    #fff8e6;
  --purple:      #5b2d8e;
  --purple-bg:   #f5eeff;
  /* Login (escuro) */
  --login-bg1:   #0b1626;
  --login-bg2:   #162b52;
  --silver:      #c0cce0;
  --silver-dim:  #7a8ea8;
  --radius:      8px;
  --radius-lg:   12px;
  --shadow:      0 1px 4px rgba(0,0,0,0.07),0 2px 12px rgba(0,0,0,0.05);
  --shadow-md:   0 4px 20px rgba(0,0,0,0.1);
  --shadow-lg:   0 8px 48px rgba(0,0,0,0.7);
  --font-display:'Cinzel', serif;
  --font-body:   'Raleway', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #eef2f8;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════════════
   FUNDO ESTRELADO
══════════════════════════════════════ */
.starfield {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  background: #061020;
}

.starfield::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 30%, rgba(10,40,100,0.7) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 70%, rgba(5,15,50,0.8) 0%, transparent 50%);
}

.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
}

@keyframes twinkle {
  0%, 100% { opacity: var(--min-op, 0.2); }
  50% { opacity: var(--max-op, 0.8); }
}

/* ══════════════════════════════════════
   LOGO SVG VÉRTICE
══════════════════════════════════════ */
.vertice-logo-svg {
  display: block;
}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#login-screen {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: fixed;
  top: 0; left: 0;
  z-index: 1;
  padding: 20px;
  background: #061020;
  overflow: hidden;
}

.login-layout {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
  width: 100%;
  max-width: 1100px;
}

.login-brand {
  text-align: center;
  flex: 1;
  max-width: 420px;
}

.login-brand-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--silver);
  margin: 20px 0 12px;
  text-shadow: 0 2px 20px rgba(192,204,224,0.3);
}

.login-brand-sub {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--silver-dim);
  text-transform: uppercase;
  line-height: 1.8;
}

.login-brand-tagline {
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 16px;
}

.login-card {
  background: rgba(22,43,82,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
}

.login-card-title {
  font-family: var(--font-display);
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--silver);
  margin-bottom: 28px;
  text-align: center;
}

.form-group {
  margin-bottom: 18px;
}

.form-label { display: block; font-family: var(--font-display); font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.65); margin-bottom: 6px; text-transform: uppercase; }

.form-input {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: #ffffff;
  font-family: var(--font-body);
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
}

.form-input:focus { border-color: rgba(255,255,255,0.7); box-shadow: 0 0 0 3px rgba(255,255,255,0.15); background: rgba(255,255,255,0.22); }

.form-input::placeholder { color: rgba(255,255,255,0.4); }
.form-input option { background: var(--navy-mid); }

textarea.form-input { resize: vertical; min-height: 80px; }

.login-error {
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.4);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: #e74c3c;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  text-align: center;
  font-family: var(--font-display);
  letter-spacing: 1px;
  font-size: 11px;
}

.login-footer {
  text-align: center;
  margin-top: 20px;
  font-family: var(--font-display);
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

/* ══════════════════════════════════════
   BOTÕES
══════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
  transition: all 0.2s;
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--navy-accent);
  color: var(--silver);
  border: 1px solid rgba(100,140,200,0.3);
  width: 100%;
  padding: 14px;
}
.btn-primary:hover {
  background: var(--navy-light);
  box-shadow: 0 4px 20px rgba(42,79,143,0.5);
  transform: translateY(-1px);
}

.btn-gold {
  background: rgba(200,150,12,0.15);
  color: var(--gold-light);
  border: 1px solid rgba(200,150,12,0.35);
}
.btn-gold:hover { background: rgba(200,150,12,0.25); box-shadow: var(--glow-gold); }

.btn-ghost {
  background: transparent;
  color: var(--silver-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--border2); }

.btn-danger { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.4); }
.btn-success { background: rgba(26,122,74,0.2); color: #27ae60; border: 1px solid rgba(26,122,74,0.4); }

.btn-sm { padding: 6px 12px; font-size: 9px; letter-spacing: 1.5px; }
.btn-icon { padding: 7px; width: 32px; height: 32px; border-radius: var(--radius); }

/* ══════════════════════════════════════
   TROCAR SENHA
══════════════════════════════════════ */
#trocar-senha-screen {
  width: 100vw;
  height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  background: #061020;
  position: fixed;
  top: 0; left: 0;
  z-index: 1;
  overflow: hidden;
}

/* ══════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════ */
#app {
  display: none;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* SIDEBAR */
.sidebar {
  width: 248px;
  background: rgba(15,32,64,0.95);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s;
}

.sidebar-header {
  padding: 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo-mark {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}

.sidebar-titles { flex: 1; min-width: 0; }

.sidebar-name {
  font-family: var(--font-display);
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--silver);
  font-weight: 600;
}

.sidebar-sub {
  font-family: var(--font-display);
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--silver-dim);
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }

.nav-section-label {
  font-family: var(--font-display);
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 12px 12px 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--silver-dim);
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 1.5px;
  font-weight: 500;
  text-transform: uppercase;
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--silver); }
.nav-item.active {
  background: rgba(42,79,143,0.25);
  color: #93b4e8;
  border: 1px solid rgba(42,79,143,0.3);
}

.nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

.nav-badge {
  margin-left: auto;
  background: var(--red-light);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
  font-family: var(--font-body);
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 12px;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}

.user-card {
  background: rgba(11,22,38,0.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.user-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid var(--border2);
}

.avatar-ADMINISTRADOR { background: rgba(139,92,246,0.2); color: #c4b5fd; }
.avatar-PRESIDENTE { background: rgba(200,150,12,0.2); color: var(--gold-light); }
.avatar-SALA_PRINCIPAL { background: rgba(42,79,143,0.3); color: #93b4e8; }
.avatar-SALA_DE_ESPERA { background: rgba(26,122,74,0.2); color: #6ee7b7; }

.user-name {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--silver);
}

.user-role {
  font-family: var(--font-body);
  font-size: 10px;
  color: var(--text-muted);
}

/* MAIN CONTENT */
.main-content {
  position: fixed;
  top: 0;
  left: 248px;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: #eef2f8;
}

.topbar {
  background: rgba(15,32,64,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--navy);
  text-transform: uppercase;
  font-weight: 700;
}

.topbar-actions { display: flex; align-items: center; gap: 8px; }

.page { padding: 24px; flex: 1; width: 100%; }

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text);
  text-transform: uppercase;
  font-weight: 700;
}

.card-body { padding: 20px; }

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
}

.stat-card.gold::before { background: linear-gradient(90deg, transparent, var(--gold-light), transparent); }
.stat-card.blue::before { background: linear-gradient(90deg, transparent, #93b4e8, transparent); }
.stat-card.green::before { background: linear-gradient(90deg, transparent, #27ae60, transparent); }
.stat-card.red::before { background: linear-gradient(90deg, transparent, #e74c3c, transparent); }
.stat-card.purple::before { background: linear-gradient(90deg, transparent, #c4b5fd, transparent); }

.stat-label {
  font-family: var(--font-display);
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  color: var(--navy);
}

.stat-sub {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
}

.stat-card.gold .stat-value { color: var(--gold); }
.stat-card.blue .stat-value { color: var(--blue); }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.red .stat-value { color: var(--red); }
.stat-card.purple .stat-value { color: var(--purple); }

/* ══════════════════════════════════════
   BADGES
══════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: var(--font-display);
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.badge-alta       { background: var(--red-bg); color: var(--red); border: 1px solid rgba(192,57,43,0.2); }
.badge-media      { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(192,120,0,0.2); }
.badge-baixa      { background: var(--green-bg); color: var(--green); border: 1px solid rgba(26,110,58,0.2); }
.badge-aguardando      { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(192,120,0,0.2); }
.badge-em-atendimento  { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(26,58,110,0.2); }
.badge-concluido       { background: var(--green-bg); color: var(--green); border: 1px solid rgba(26,110,58,0.2); }
.badge-adiado          { background: #f5f5f5; color: #6b7280; border: 1px solid #e5e7eb; }
.badge-Vereador   { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(91,45,142,0.2); }
.badge-Autoridade { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(184,134,11,0.2); }
.badge-Cidadão    { background: #f5f5f5; color: #6b7280; border: 1px solid #e5e7eb; }

/* ══════════════════════════════════════
   TABELA
══════════════════════════════════════ */
.table-wrap { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }

thead th {
  padding: 10px 16px;
  text-align: left;
  font-family: var(--font-display);
  font-size: 8.5px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: var(--bg3); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 12px 16px; font-size: 13px; color: var(--text); }

/* ══════════════════════════════════════
   FILA
══════════════════════════════════════ */
.fila-item {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.fila-item:hover { box-shadow: var(--shadow-md); }

.fila-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.fila-item.alta::before { background: linear-gradient(180deg, #e74c3c, rgba(231,76,60,0.3)); }
.fila-item.media::before { background: linear-gradient(180deg, var(--gold-light), rgba(232,180,34,0.3)); }
.fila-item.baixa::before { background: linear-gradient(180deg, #27ae60, rgba(39,174,96,0.3)); }
.fila-item.em-atendimento { background: var(--blue-bg); border-color: rgba(26,58,110,0.25); }

.fila-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 32px;
}

.fila-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
  border: 1px solid var(--border2);
}

.fila-info { flex: 1; min-width: 0; }

.fila-nome {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 4px;
}

.fila-meta {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.fila-actions { display: flex; gap: 8px; flex-shrink: 0; }

.fila-tempo {
  font-size: 12px;
  color: var(--text-muted);
  min-width: 50px;
  text-align: right;
  font-weight: 500;
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: white;
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 2.5px;
  color: var(--navy);
  text-transform: uppercase;
  font-weight: 700;
}

.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* ══════════════════════════════════════
   CHAT
══════════════════════════════════════ */
.chat-container { display: flex; height: calc(100vh - 56px); }

.chat-sidebar {
  width: 240px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: rgba(15,32,64,0.5);
  flex-shrink: 0;
}

.chat-conv {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-conv:hover { background: rgba(255,255,255,0.03); }
.chat-conv.active { background: rgba(42,79,143,0.2); }
.chat-conv-name { font-family: var(--font-display); font-size: 10px; letter-spacing: 1.5px; color: var(--silver); }
.chat-conv-last { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg3); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg { display: flex; gap: 10px; max-width: 75%; }
.msg.sent { margin-left: auto; flex-direction: row-reverse; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
}

.msg.received .msg-bubble { background: white; border: 1px solid var(--border); color: var(--text); }
.msg.sent .msg-bubble { background: var(--navy); color: white; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-display); letter-spacing: 0.5px; }

.chat-input-area {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: white;
}

.chat-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  resize: none;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input:focus { border-color: var(--navy-accent); }

/* ══════════════════════════════════════
   AGENDA
══════════════════════════════════════ */
.agenda-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

.agenda-day-header {
  text-align: center;
  font-family: var(--font-display);
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 8px;
}

.agenda-day {
  min-height: 90px;
  background: white;
  border: 1px solid var(--border);
  padding: 6px;
  cursor: pointer;
  transition: background 0.1s;
}

.agenda-day:hover { background: var(--bg3); }
.agenda-day.today { background: var(--blue-bg); border-color: var(--blue); }
.agenda-day.other-month { background: var(--bg3); opacity: 0.6; }

.agenda-day-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.agenda-day.today .agenda-day-num {
  background: var(--navy);
  color: white;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}

.agenda-event-dot {
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  background: var(--blue-bg);
  color: var(--blue);
  border-left: 2px solid var(--blue);
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  min-width: 280px;
  max-width: 360px;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  backdrop-filter: blur(20px);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(80px); }
  to { opacity: 1; transform: translateX(0); }
}

.toast-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.toast-title { font-family: var(--font-display); font-size: 10px; letter-spacing: 1.5px; color: var(--silver); margin-bottom: 3px; }
.toast-msg { font-size: 12px; color: var(--text-dim); }
.toast.success { border-left: 2px solid #27ae60; }
.toast.error   { border-left: 2px solid #e74c3c; }
.toast.info    { border-left: 2px solid #93b4e8; }
.toast.warning { border-left: 2px solid var(--gold-light); }

/* ══════════════════════════════════════
   EMPTY STATE / LOADING
══════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}

.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

.empty-state h3 {
  font-family: var(--font-display);
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.empty-state p { font-size: 12px; color: var(--text-muted); }

.loading { display: flex; align-items: center; justify-content: center; padding: 48px; }

.spinner {
  width: 26px; height: 26px;
  border: 2px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════
   LAYOUT HELPERS
══════════════════════════════════════ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
.flex { display: flex; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-gap { display: flex; align-items: center; gap: 8px; }
.mt-8  { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }

/* ══════════════════════════════════════
   RESPONSIVO
══════════════════════════════════════ */
.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--silver);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

.sidebar-overlay.open { display: block; }

@media (max-width: 768px) {
  /* Sidebar: gaveta oculta */
  .sidebar {
    position: fixed !important;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    z-index: 200;
    transition: transform 0.28s ease;
    width: 252px !important;
  }
  .sidebar.open { transform: translateX(0); }

  /* Main: tela cheia */
  .main-content {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    right: 0 !important; bottom: 0 !important;
    width: 100vw !important;
    margin-left: 0 !important;
  }

  .mobile-menu-btn { display: block; }
  .topbar { padding: 0 14px; height: 52px; }
  .topbar-info, .topbar-view-label, .topbar-view-select { display: none; }
  .topbar-title { font-size: 11px; letter-spacing: 1.5px; }
  .page { padding: 14px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-value { font-size: 24px; }
  .stat-card { padding: 14px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .kanban { grid-template-columns: 1fr; }
  .chat-sidebar { display: none; }
  .login-layout { flex-direction: column; gap: 20px; padding: 24px 16px; }
  .login-brand { max-width: 100%; }
  .login-brand-name { font-size: 24px; }
  .login-card { padding: 28px 20px; width: 100%; max-width: 100%; }
  .agenda-day { min-height: 55px; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .fila-item { flex-wrap: wrap; }
  .fila-actions { width: 100%; justify-content: flex-end; margin-top: 4px; }
  .modal { max-width: 100%; border-radius: 16px 16px 0 0; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .dash-header { flex-direction: column; gap: 6px; }
}
